<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MESAN Omega CRM</title>
<link rel="stylesheet" href="crm.css">
</head>
<body>
<div id="login">
  <div class="box">
    <h1>MESAN Omega</h1>
    <p>COMMAND CENTER</p>
    <input type="password" id="key" placeholder="API Key">
    <button onclick="login()">ENTRAR</button>
  </div>
</div>
<div id="app">
  <div class="top">
    <h2>PIPELINE</h2>
    <div>
      <button onclick="load()">Actualizar</button>
      <button onclick="window.open('/admin.html')">Consultor IA</button>
      <button onclick="logout()">Salir</button>
    </div>
  </div>
  <div class="kpis">
    <div class="kpi"><span>LEADS</span><b id="k1">0</b></div>
    <div class="kpi"><span>CRITICOS</span><b id="k2">0</b></div>
    <div class="kpi"><span>PIPELINE</span><b id="k3">$0</b></div>
    <div class="kpi"><span>CERRADOS</span><b id="k4">0</b></div>
  </div>
  <div class="block">
    <h4>Leads</h4>
    <div class="leads" id="leads"></div>
  </div>
  <div class="block">
    <h4>Diagnostico IA</h4>
    <input id="q" placeholder="Describe la situacion">
    <button onclick="diagnosticar()">ANALIZAR</button>
    <div id="out"></div>
  </div>
</div>
<script src="crm.js"></script>
</body>
</html>
